[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

# Environment variables for TinaCMS
[context.production.environment]
  TINA_PUBLIC_IS_LOCAL = "false"

# Headers for TinaCMS admin
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

# Headers for all routes - fix CORS and auth issues
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Redirect all non-file requests to index.html for SPA routing
# This allows React Router to handle the routing on the client side
# The rule excludes actual files (with extensions) and only redirects HTML-like paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
